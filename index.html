<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cocina Gourmet | Pedidos Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-primary { background: linear-gradient(135deg, #10b981, #3b82f6); transition: all 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4); }
        input, select, textarea { background: #1e293b !important; border: 1px solid #334155 !important; color: white !important; padding: 0.75rem 1rem; border-radius: 0.75rem; width: 100%; outline: none; }
        input:focus, select:focus { border-color: #10b981 !important; }
        
        .img-container { position: relative; overflow: hidden; padding-top: 80%; border-radius: 1rem; background: #1e293b; }
        .img-container img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        
        .cart-sidebar { transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .cart-sidebar.open { transform: translateX(0); }

        .loading-spinner { border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid #10b981; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .pop-in { animation: popIn 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- Navegación -->
    <nav class="glass sticky top-0 z-40 px-4 md:px-8 py-4 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-3 cursor-pointer" onclick="showView('shop')">
            <div class="w-10 h-10 bg-emerald-600 rounded-xl flex items-center justify-center font-bold text-lg text-white">CG</div>
            <div>
                <h1 class="font-bold leading-none">Cocina Gourmet</h1>
                <span class="text-[10px] text-emerald-400 font-bold uppercase tracking-tighter">Frozen Premium</span>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="showView('shop')" class="p-2 text-slate-400 hover:text-white transition-all"><i class="fa-solid fa-house text-xl"></i></button>
            <button onclick="checkAdminAccess()" class="p-2 text-slate-400 hover:text-white transition-all"><i class="fa-solid fa-user-gear text-xl"></i></button>
            <button onclick="toggleCart()" class="relative bg-slate-800 p-3 rounded-xl hover:bg-slate-700 transition-all">
                <i class="fa-solid fa-basket-shopping text-emerald-400 text-xl"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-rose-500 text-[10px] font-bold px-1.5 py-0.5 rounded-full hidden">0</span>
            </button>
        </div>
    </nav>

    <!-- Modal de Confirmación de Agregado -->
    <div id="modal-added-confirm" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-slate-950/80 backdrop-blur-sm p-4">
        <div class="glass p-8 rounded-3xl w-full max-w-sm border border-white/10 text-center pop-in">
            <div class="w-16 h-16 bg-emerald-500/20 text-emerald-400 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">
                <i class="fa-solid fa-check"></i>
            </div>
            <h3 class="text-xl font-bold mb-1">¡Agregado con éxito!</h3>
            <p id="added-product-name" class="text-slate-400 text-sm mb-6"></p>
            
            <div class="space-y-3">
                <button onclick="toggleCart(); closeAddedModal();" class="w-full btn-primary py-3 rounded-xl font-bold text-white flex items-center justify-center gap-2">
                    <i class="fa-solid fa-cart-shopping"></i> Terminar Compra
                </button>
                <button onclick="closeAddedModal()" class="w-full bg-slate-800 hover:bg-slate-700 py-3 rounded-xl font-bold text-slate-300 transition-colors">
                    Seguir Comprando
                </button>
            </div>
        </div>
    </div>

    <!-- Modal Login Administrador -->
    <div id="modal-admin-login" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-slate-950/95 backdrop-blur-md p-4">
        <div class="glass p-8 rounded-3xl w-full max-w-sm border border-white/10 text-center">
            <div class="w-16 h-16 bg-emerald-600/20 text-emerald-400 rounded-2xl flex items-center justify-center mx-auto mb-6 text-2xl">
                <i class="fa-solid fa-lock"></i>
            </div>
            <h3 class="text-xl font-bold mb-2">Acceso Admin</h3>
            <div id="login-error-msg" class="hidden mb-4 p-3 bg-rose-500/10 border border-rose-500/20 rounded-xl text-xs text-rose-400"></div>
            <input type="password" id="admin-password" placeholder="Contraseña" class="mb-4 text-center tracking-widest">
            <div class="flex gap-2">
                <button onclick="attemptAdminLogin()" class="flex-1 btn-primary py-3 rounded-xl font-bold text-white">Entrar</button>
                <button onclick="closeAdminLogin()" class="px-4 bg-slate-700 py-3 rounded-xl font-bold">Cerrar</button>
            </div>
        </div>
    </div>

    <!-- Sidebar Carrito -->
    <div id="cart-sidebar" class="cart-sidebar fixed right-0 top-0 h-full w-full max-w-md bg-slate-900 z-50 shadow-2xl flex flex-col border-l border-white/5">
        <div class="p-6 border-b border-white/5 flex justify-between items-center">
            <h2 class="text-xl font-bold"><i class="fa-solid fa-cart-shopping text-emerald-500 mr-2"></i>Mi Pedido</h2>
            <button onclick="toggleCart()" class="text-slate-400 text-2xl"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4"></div>

        <div class="p-6 bg-slate-800/40 border-t border-white/10 space-y-4">
            <div id="checkout-form" class="hidden space-y-3 pb-4">
                <input type="text" id="cust-name" placeholder="Tu Nombre">
                <input type="text" id="cust-address" placeholder="Dirección de entrega">
                <div class="space-y-1">
                    <select id="cust-zone" onchange="calculateFinalTotal()">
                        <option value="">Selecciona Zona de Envío</option>
                    </select>
                    <div id="shipping-notice" class="hidden px-3 text-xs text-emerald-400 font-bold"></div>
                </div>
                <select id="cust-payment" onchange="updatePaymentUI()">
                    <option value="efectivo">Efectivo al recibir</option>
                    <option value="transferencia">Transferencia Bancaria</option>
                </select>
                <div id="bank-data" class="hidden p-4 bg-emerald-500/10 border border-emerald-500/20 rounded-xl text-xs text-emerald-400">
                    <p class="font-bold mb-1">Datos para Transferencia:</p>
                    <div id="bank-info-txt"></div>
                </div>
            </div>

            <div class="space-y-1 border-t border-white/5 pt-4">
                <div class="flex justify-between items-center text-sm text-slate-400">
                    <span>Subtotal:</span>
                    <span id="cart-subtotal">$0</span>
                </div>
                <div class="flex justify-between items-center text-sm text-slate-400">
                    <span>Envío:</span>
                    <span id="cart-shipping-cost">$0</span>
                </div>
                <div class="flex justify-between items-center text-xl font-bold mt-2">
                    <span>Total:</span>
                    <span id="cart-total" class="text-emerald-400">$0</span>
                </div>
            </div>

            <button id="btn-next" onclick="showCheckout()" class="w-full btn-primary py-4 rounded-2xl font-bold text-white">
                Siguiente: Datos de Envío
            </button>
            <button id="btn-submit" onclick="processOrder()" class="hidden w-full btn-primary py-4 rounded-2xl font-bold text-white flex items-center justify-center gap-2">
                <i class="fa-brands fa-whatsapp text-2xl"></i> CONFIRMAR PEDIDO
            </button>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- VISTA TIENDA -->
        <section id="view-shop">
            <div class="mb-8">
                <h2 class="text-3xl font-extrabold mb-4">Catálogo Gourmet</h2>
                <div class="flex gap-2 overflow-x-auto pb-4" id="cat-list"></div>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6" id="products-grid"></div>
        </section>

        <!-- VISTA ADMIN -->
        <section id="view-admin" class="hidden">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold text-white">Administrador</h2>
                <button onclick="logoutAdmin()" class="bg-slate-800 px-4 py-2 rounded-lg text-xs hover:bg-slate-700 transition-colors">Cerrar Sesión</button>
            </div>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Columna Izquierda: Productos -->
                <div class="lg:col-span-2 space-y-6">
                    <div class="glass p-6 rounded-2xl">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-bold text-emerald-400"><i class="fa-solid fa-boxes-stacked mr-2"></i>Productos</h3>
                            <button onclick="openProductModal()" class="bg-emerald-600 px-4 py-2 rounded-lg text-xs font-bold text-white hover:bg-emerald-500">+ Nuevo Producto</button>
                        </div>
                        <div id="admin-products" class="space-y-2 max-h-[600px] overflow-y-auto pr-2"></div>
                    </div>
                </div>

                <!-- Columna Derecha: Configuración -->
                <div class="space-y-6">
                    <!-- Conexión Supabase -->
                    <div class="glass p-6 rounded-2xl border border-blue-500/20">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-bold text-blue-400"><i class="fa-solid fa-database mr-2"></i>Conexión Base de Datos</h3>
                            <div id="db-status-dot" class="w-3 h-3 rounded-full bg-slate-600" title="Estado desconocido"></div>
                        </div>
                        <div class="space-y-3">
                            <div>
                                <label class="text-[10px] text-slate-400 uppercase font-bold ml-1">Supabase URL</label>
                                <input type="text" id="db-url" placeholder="https://xyz.supabase.co" class="text-xs">
                            </div>
                            <div>
                                <label class="text-[10px] text-slate-400 uppercase font-bold ml-1">Supabase Anon Key</label>
                                <input type="password" id="db-key" placeholder="eyJhbGciOiJIUzI1..." class="text-xs">
                            </div>
                            <button onclick="saveDbConnection()" class="w-full bg-blue-600/20 text-blue-400 py-2 rounded-lg text-xs font-bold hover:bg-blue-600/30 transition-colors">
                                Actualizar Conexión
                            </button>
                        </div>
                    </div>

                    <!-- Zonas de Envío -->
                    <div class="glass p-6 rounded-2xl">
                        <h3 class="font-bold text-emerald-400 mb-4"><i class="fa-solid fa-truck-fast mr-2"></i>Zonas y Costos de Envío</h3>
                        <div class="space-y-2 mb-4 max-h-[300px] overflow-y-auto pr-2" id="admin-zones"></div>
                        <div class="space-y-2 pt-2 border-t border-white/5">
                            <input type="text" id="new-zone-name" placeholder="Nombre Zona" class="text-sm">
                            <input type="text" id="new-zone-wa" placeholder="WhatsApp (Ej: 54911...)" class="text-sm">
                            <input type="number" id="new-zone-cost" placeholder="Costo Envío ($)" class="text-sm">
                            <button onclick="addZone()" class="w-full bg-emerald-600/20 text-emerald-400 py-2 rounded-lg text-xs font-bold hover:bg-emerald-600/30">Añadir Zona</button>
                        </div>
                    </div>

                    <!-- Ajustes Banco -->
                    <div class="glass p-6 rounded-2xl">
                        <h3 class="font-bold text-orange-400 mb-4"><i class="fa-solid fa-building-columns mr-2"></i>Datos de Pago</h3>
                        <div class="space-y-2">
                            <input type="text" id="bank-alias" placeholder="Alias Banco" class="text-sm">
                            <input type="text" id="bank-cbu" placeholder="CBU/CVU" class="text-sm">
                            <button onclick="saveBank()" class="w-full bg-emerald-600/20 text-emerald-400 py-2 rounded-lg text-xs font-bold hover:bg-emerald-600/30">Guardar Banco</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Modal Producto -->
    <div id="modal-product" class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-slate-950/90 backdrop-blur-sm p-4">
        <div class="glass p-8 rounded-3xl w-full max-w-lg border border-white/10">
            <h3 class="text-xl font-bold mb-6 text-emerald-400" id="modal-title">Gestión de Producto</h3>
            <form id="form-product" class="space-y-4">
                <input type="text" id="p-name" placeholder="Nombre del Producto" required>
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="p-price" step="0.01" placeholder="Precio ($)" required>
                    <select id="p-cat" required><option value="">Seleccionar Categoría</option></select>
                </div>
                
                <div class="space-y-2">
                    <label class="text-[10px] text-slate-400 uppercase font-bold ml-1">Imagen del Producto</label>
                    <input type="file" id="p-file" accept="image/*" class="text-xs file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-emerald-600/20 file:text-emerald-400 hover:file:bg-emerald-600/30">
                    <p class="text-[10px] text-slate-500 italic">O pega una URL directa:</p>
                    <input type="text" id="p-img" placeholder="https://ejemplo.com/foto.jpg">
                </div>

                <div class="flex gap-2 pt-4">
                    <button type="submit" id="p-submit-btn" class="flex-1 btn-primary py-3 rounded-xl font-bold text-white">
                        <span id="p-btn-text">Guardar Producto</span>
                        <span id="p-btn-loader" class="hidden"><div class="loading-spinner mr-2"></div> Procesando...</span>
                    </button>
                    <button type="button" onclick="closeProductModal()" class="px-6 bg-slate-700 py-3 rounded-xl font-bold">Cerrar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const DB_CONFIG_KEY = 'cg_supabase_config_v1';
        const ADMIN_PASS_KEY = 'cg_admin_pass_v2';
        const ATTEMPTS_KEY = 'cg_admin_attempts_v2';
        const LOCKOUT_KEY = 'cg_admin_lockout_v2';

        const INITIAL_URL = "https://peoimydvofprzemjvyzg.supabase.co";
        const INITIAL_KEY = "sb_publishable_pq5tsxdZqiNJxiQg7R6YpQ_vshWWv7H";

        let sb = null;
        let products = [];
        let categories = [];
        let zones = [];
        let bankSettings = {};
        let cart = [];
        let currentCat = 'all';
        let isViewAdminUnlocked = false;

        window.onload = () => {
            const savedConfig = JSON.parse(localStorage.getItem(DB_CONFIG_KEY));
            const url = savedConfig?.url || INITIAL_URL;
            const key = savedConfig?.key || INITIAL_KEY;
            
            document.getElementById('db-url').value = url;
            document.getElementById('db-key').value = key;

            initSupabase(url, key);
        };

        async function initSupabase(url, key) {
            try {
                sb = supabase.createClient(url, key);
                const { error } = await sb.from('products').select('id').limit(1);
                updateDbStatus(!error);
                loadAllData();
            } catch (e) {
                updateDbStatus(false);
            }
        }

        function updateDbStatus(isOk) {
            const dot = document.getElementById('db-status-dot');
            dot.className = `w-3 h-3 rounded-full ${isOk ? 'bg-emerald-500 shadow-[0_0_8px_#10b981]' : 'bg-rose-500 shadow-[0_0_8px_#f43f5e]'}`;
        }

        function saveDbConnection() {
            const url = document.getElementById('db-url').value.trim();
            const key = document.getElementById('db-key').value.trim();
            if(!url || !key) return alert("URL y Key son requeridas");
            localStorage.setItem(DB_CONFIG_KEY, JSON.stringify({ url, key }));
            window.location.reload();
        }

        async function loadAllData() {
            try {
                const [p, c, z, s] = await Promise.all([
                    sb.from('products').select('*').order('name'),
                    sb.from('categories').select('*').order('name'),
                    sb.from('zones').select('*').order('name'),
                    sb.from('settings').select('*').maybeSingle()
                ]);
                
                products = p.data || [];
                categories = c.data || [];
                zones = z.data || [];
                bankSettings = s.data || {};

                renderShop();
                renderAdmin();
                updateCheckoutUI();
                loadCart(); 
            } catch (e) {
                console.error("Error cargando datos:", e);
            }
        }

        function showAddedModal(productName) {
            document.getElementById('added-product-name').innerText = productName;
            document.getElementById('modal-added-confirm').classList.remove('hidden');
        }

        function closeAddedModal() {
            document.getElementById('modal-added-confirm').classList.add('hidden');
        }

        async function uploadProductImage(file) {
            const fileExt = file.name.split('.').pop();
            const fileName = `${Date.now()}-${Math.random().toString(36).substring(2)}.${fileExt}`;
            const filePath = `product-images/${fileName}`;
            const { data, error } = await sb.storage.from('products').upload(filePath, file);
            if (error) throw error;
            const { data: { publicUrl } } = sb.storage.from('products').getPublicUrl(filePath);
            return publicUrl;
        }

        function checkAdminAccess() {
            if (isViewAdminUnlocked) { showView('admin'); return; }
            const lockout = localStorage.getItem(LOCKOUT_KEY);
            if (lockout && parseInt(lockout) > Date.now()) {
                const mins = Math.ceil((parseInt(lockout) - Date.now()) / 60000);
                alert(`Acceso bloqueado por ${mins} minutos.`);
                return;
            }
            document.getElementById('modal-admin-login').classList.remove('hidden');
        }

        function attemptAdminLogin() {
            const pass = document.getElementById('admin-password').value;
            const master = localStorage.getItem(ADMIN_PASS_KEY) || 'admin123';
            let attempts = parseInt(localStorage.getItem(ATTEMPTS_KEY) || '0');

            if (pass === master) {
                isViewAdminUnlocked = true;
                localStorage.setItem(ATTEMPTS_KEY, '0');
                closeAdminLogin();
                showView('admin');
            } else {
                attempts++;
                localStorage.setItem(ATTEMPTS_KEY, attempts);
                if (attempts >= 3) {
                    localStorage.setItem(LOCKOUT_KEY, Date.now() + 1800000);
                    closeAdminLogin();
                } else {
                    document.getElementById('login-error-msg').innerText = `Incorrecto (${attempts}/3)`;
                    document.getElementById('login-error-msg').classList.remove('hidden');
                }
            }
        }

        function closeAdminLogin() { document.getElementById('modal-admin-login').classList.add('hidden'); }
        function logoutAdmin() { isViewAdminUnlocked = false; showView('shop'); }

        function renderShop() {
            const catCont = document.getElementById('cat-list');
            catCont.innerHTML = `<button onclick="setFilter('all')" class="px-5 py-2 rounded-full font-bold whitespace-nowrap ${currentCat === 'all' ? 'bg-emerald-600' : 'bg-slate-800 text-slate-400'}">Todos</button>`;
            categories.forEach(c => {
                catCont.innerHTML += `<button onclick="setFilter('${c.id}')" class="px-5 py-2 rounded-full font-bold whitespace-nowrap ${currentCat === c.id ? 'bg-emerald-600' : 'bg-slate-800 text-slate-400'}">${c.name}</button>`;
            });

            const grid = document.getElementById('products-grid');
            let filtered = products;
            if(currentCat !== 'all') filtered = products.filter(p => p.category_id === currentCat);
            
            grid.innerHTML = filtered.map(p => `
                <div class="glass p-4 rounded-3xl flex flex-col group">
                    <div class="img-container mb-4">
                        <img src="${p.image_url || 'https://via.placeholder.com/400'}" onerror="this.src='https://via.placeholder.com/400'">
                    </div>
                    <h3 class="font-bold mb-1">${p.name}</h3>
                    <p class="text-emerald-400 font-bold text-xl mb-4">$${p.price.toLocaleString()}</p>
                    <button onclick="addToCart('${p.id}')" class="btn-primary py-3 rounded-2xl font-bold text-white">Agregar al carrito</button>
                </div>
            `).join('');
        }

        function setFilter(id) { currentCat = id; renderShop(); }

        function addToCart(id) {
            const p = products.find(x => x.id === id);
            if (!p) return;
            const item = cart.find(x => x.id === id);
            if(item) item.qty++; else cart.push({...p, qty: 1});
            saveCart();
            updateCartUI();
            showAddedModal(p.name);
        }

        function saveCart() { 
            const minimalCart = cart.map(i => ({ id: i.id, qty: i.qty }));
            localStorage.setItem('cg_cart_v3', JSON.stringify(minimalCart)); 
        }

        function loadCart() { 
            const saved = localStorage.getItem('cg_cart_v3');
            if(saved) {
                try {
                    const minimalCart = JSON.parse(saved);
                    cart = minimalCart.map(m => {
                        const op = products.find(p => p.id === m.id);
                        return op ? { ...op, qty: m.qty } : null;
                    }).filter(Boolean);
                } catch(e) { cart = []; }
            }
            updateCartUI();
        }

        function updateCartUI() {
            const count = cart.reduce((a, b) => a + b.qty, 0);
            document.getElementById('cart-count').innerText = count;
            document.getElementById('cart-count').classList.toggle('hidden', count === 0);
            
            const cont = document.getElementById('cart-items');
            cont.innerHTML = cart.length === 0 ? `<div class="text-center py-20 opacity-40"><p>Tu carrito está vacío</p></div>` : 
                cart.map((i, idx) => `
                    <div class="flex items-center gap-3 bg-slate-800/50 p-3 rounded-xl border border-white/5">
                        <img src="${i.image_url}" class="w-12 h-12 object-cover rounded-lg">
                        <div class="flex-1">
                            <div class="font-bold text-sm leading-tight">${i.name}</div>
                            <div class="text-xs text-emerald-400">$${(i.price * i.qty).toLocaleString()}</div>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="modQty(${idx}, -1)" class="w-6 h-6 bg-slate-700 rounded flex items-center justify-center"><i class="fa-solid fa-minus text-[10px]"></i></button>
                            <span class="w-4 text-center font-bold text-xs">${i.qty}</span>
                            <button onclick="modQty(${idx}, 1)" class="w-6 h-6 bg-slate-700 rounded flex items-center justify-center"><i class="fa-solid fa-plus text-[10px]"></i></button>
                        </div>
                    </div>
                `).join('');
            
            calculateFinalTotal();
        }

        function calculateFinalTotal() {
            const subtotal = cart.reduce((a, b) => a + (b.price * b.qty), 0);
            const zoneId = document.getElementById('cust-zone').value;
            const zone = zones.find(z => z.id === zoneId);
            const shipping = zone ? parseFloat(zone.shipping_cost || 0) : 0;
            const total = subtotal + shipping;

            document.getElementById('cart-subtotal').innerText = `$${subtotal.toLocaleString()}`;
            document.getElementById('cart-shipping-cost').innerText = `$${shipping.toLocaleString()}`;
            document.getElementById('cart-total').innerText = `$${total.toLocaleString()}`;

            const notice = document.getElementById('shipping-notice');
            if (zone) {
                notice.innerText = `Costo de envío para ${zone.name}: $${shipping.toLocaleString()}`;
                notice.classList.remove('hidden');
            } else {
                notice.classList.add('hidden');
            }
        }

        function modQty(idx, d) {
            cart[idx].qty += d;
            if(cart[idx].qty <= 0) cart.splice(idx, 1);
            saveCart(); updateCartUI();
        }

        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('open'); }

        function showCheckout() {
            if(cart.length === 0) return alert("Carrito vacío");
            document.getElementById('checkout-form').classList.remove('hidden');
            document.getElementById('btn-next').classList.add('hidden');
            document.getElementById('btn-submit').classList.remove('hidden');
        }

        function updateCheckoutUI() {
            const sel = document.getElementById('cust-zone');
            sel.innerHTML = `<option value="">Selecciona Zona de Envío</option>` + zones.map(z => `<option value="${z.id}">${z.name}</option>`).join('');
            document.getElementById('bank-info-txt').innerHTML = `Alias: <b>${bankSettings.bank_alias || '-'}</b><br>CBU: <b>${bankSettings.bank_cbu || '-'}</b>`;
        }

        function updatePaymentUI() {
            const t = document.getElementById('cust-payment').value === 'transferencia';
            document.getElementById('bank-data').classList.toggle('hidden', !t);
        }

        async function processOrder() {
            const name = document.getElementById('cust-name').value.trim();
            const addr = document.getElementById('cust-address').value.trim();
            const zId = document.getElementById('cust-zone').value;
            const pay = document.getElementById('cust-payment').value;

            if(!name || !addr || !zId) return alert("Completa los datos");

            const zone = zones.find(z => z.id === zId);
            const subtotal = cart.reduce((a, b) => a + (b.price * b.qty), 0);
            const shipping = parseFloat(zone.shipping_cost || 0);
            const total = subtotal + shipping;

            let t = `*NUEVO PEDIDO - COCINA GOURMET*\n`;
            t += `--------------------------\n`;
            t += `👤 *Cliente:* ${name}\n`;
            t += `📍 *Entrega:* ${addr}\n`;
            t += `🏙️ *Zona:* ${zone.name}\n`;
            t += `💳 *Pago:* ${pay.toUpperCase()}\n`;
            t += `--------------------------\n`;
            cart.forEach(i => t += `• ${i.qty}x ${i.name} ($${(i.price * i.qty).toLocaleString()})\n`);
            t += `--------------------------\n`;
            t += `📦 Subtotal: $${subtotal.toLocaleString()}\n`;
            t += `🚚 Envío: $${shipping.toLocaleString()}\n`;
            t += `💰 *TOTAL: $${total.toLocaleString()}*`;

            const waUrl = `https://wa.me/${zone.whatsapp || '54911'}?text=${encodeURIComponent(t)}`;

            try {
                await sb.from('orders').insert([{ customer_name: name, customer_address: addr, zone_id: zId, total_amount: total }]);
            } catch (e) {}

            cart = []; saveCart(); updateCartUI(); toggleCart();
            window.open(waUrl, '_blank');
        }

        // --- ADMIN ---
        function renderAdmin() {
            document.getElementById('admin-products').innerHTML = products.map(p => `
                <div class="flex justify-between bg-slate-800/40 p-3 rounded-xl items-center border border-white/5">
                    <div class="flex items-center gap-3">
                        <img src="${p.image_url}" class="w-10 h-10 object-cover rounded-lg">
                        <div>
                            <div class="font-bold text-sm">${p.name}</div>
                            <div class="text-xs text-slate-400">$${p.price.toLocaleString()}</div>
                        </div>
                    </div>
                    <button onclick="deleteProduct('${p.id}')" class="text-rose-400 p-2"><i class="fa-solid fa-trash"></i></button>
                </div>
            `).join('');

            document.getElementById('admin-zones').innerHTML = zones.map(z => `
                <div class="flex justify-between bg-slate-800/40 p-3 rounded-xl text-sm border border-white/5 items-center">
                    <div class="flex-1">
                        <div class="font-bold">${z.name}</div>
                        <div class="text-[10px] text-slate-400">WhatsApp: ${z.whatsapp}</div>
                        <div class="text-[10px] text-emerald-400 font-bold">Envío: $${z.shipping_cost || 0}</div>
                    </div>
                    <button onclick="deleteZone('${z.id}')" class="text-rose-400 p-2"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            `).join('');
        }

        async function addZone() {
            const n = document.getElementById('new-zone-name').value;
            const w = document.getElementById('new-zone-wa').value;
            const c = document.getElementById('new-zone-cost').value || 0;
            if(!n || !w) return alert("Nombre y WhatsApp obligatorios");
            await sb.from('zones').insert([{ name: n, whatsapp: w, shipping_cost: parseFloat(c) }]);
            loadAllData();
        }

        async function deleteZone(id) { if(confirm("¿Eliminar?")) { await sb.from('zones').delete().eq('id', id); loadAllData(); } }
        async function deleteProduct(id) { if(confirm("¿Eliminar?")) { await sb.from('products').delete().eq('id', id); loadAllData(); } }
        
        async function saveBank() {
            const d = { bank_alias: document.getElementById('bank-alias').value, bank_cbu: document.getElementById('bank-cbu').value };
            if(bankSettings.id) await sb.from('settings').update(d).eq('id', bankSettings.id);
            else await sb.from('settings').insert([d]);
            alert("Guardado");
            loadAllData();
        }

        function showView(v) {
            document.getElementById('view-shop').classList.toggle('hidden', v !== 'shop');
            document.getElementById('view-admin').classList.toggle('hidden', v !== 'admin');
        }

        function openProductModal() {
            document.getElementById('p-cat').innerHTML = `<option value="">Seleccionar Categoría</option>` + categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            document.getElementById('modal-product').classList.remove('hidden');
        }
        function closeProductModal() { document.getElementById('modal-product').classList.add('hidden'); }

        document.getElementById('form-product').onsubmit = async (e) => {
            e.preventDefault();
            const file = document.getElementById('p-file').files[0];
            let imageUrl = document.getElementById('p-img').value || 'https://via.placeholder.com/400';
            if (file) imageUrl = await uploadProductImage(file);

            await sb.from('products').insert([{
                name: document.getElementById('p-name').value,
                price: parseFloat(document.getElementById('p-price').value),
                category_id: document.getElementById('p-cat').value,
                image_url: imageUrl
            }]);
            closeProductModal(); loadAllData(); e.target.reset();
        };
    </script>
</body>
</html>
