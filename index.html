<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cocina Gourmet | Admin & Tienda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #2563eb); transition: all 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }
        input, select { background: #1e293b; border: 1px solid #334155; color: white; padding: 0.5rem 1rem; border-radius: 0.5rem; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen">

    <!-- Configuración Inicial / Login -->
    <div id="setup-screen" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-950/90 p-4">
        <div class="glass p-8 rounded-2xl w-full max-w-md shadow-2xl">
            <h2 class="text-2xl font-bold mb-6 text-center">Configuración Supabase</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm mb-1 text-slate-400">URL del Proyecto</label>
                    <input type="text" id="supabase-url" class="w-full" placeholder="https://xyz.supabase.co">
                </div>
                <div>
                    <label class="block text-sm mb-1 text-slate-400">Clave ANON (Pública)</label>
                    <input type="password" id="supabase-key" class="w-full" placeholder="eyJhbGciOiJIUzI1Ni...">
                </div>
                <button onclick="saveConnection()" class="w-full btn-primary py-3 rounded-xl font-bold mt-4">Guardar y Conectar</button>
            </div>
        </div>
    </div>

    <!-- Login de Administrador -->
    <div id="admin-login" class="hidden fixed inset-0 z-40 flex items-center justify-center bg-slate-950/80 p-4">
        <div class="glass p-8 rounded-2xl w-full max-w-sm shadow-2xl">
            <h2 class="text-xl font-bold mb-4 text-center text-blue-400">Acceso Administrador</h2>
            <div class="space-y-4">
                <input type="password" id="admin-pass-input" class="w-full" placeholder="Contraseña">
                <div class="flex gap-2">
                    <button onclick="checkAdminPassword()" class="flex-1 btn-primary py-2 rounded-lg font-bold">Entrar</button>
                    <button onclick="toggleLogin(false)" class="flex-1 bg-slate-700 py-2 rounded-lg font-bold">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Navegación Principal -->
    <nav class="glass sticky top-0 z-30 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-xl shadow-lg shadow-blue-500/20">CG</div>
            <div>
                <h1 class="font-bold text-lg leading-none">Cocina Gourmet</h1>
                <span class="text-xs text-blue-400 font-medium uppercase tracking-wider">Premium Frozen Foods</span>
            </div>
        </div>
        <div class="flex items-center gap-2 md:gap-4">
            <button onclick="toggleLogin(true)" id="admin-btn" class="p-2 hover:bg-slate-800 rounded-full transition-colors text-slate-400 hover:text-blue-400">
                <i class="fa-solid fa-user-shield"></i>
            </button>
            <button onclick="showCart()" class="relative p-2 hover:bg-slate-800 rounded-full transition-colors text-slate-400 hover:text-blue-400">
                <i class="fa-solid fa-cart-shopping"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-blue-600 text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold border-2 border-slate-900">0</span>
            </button>
            <button onclick="showSetup()" class="p-2 hover:bg-slate-800 rounded-full transition-colors text-slate-400 hover:text-slate-200">
                <i class="fa-solid fa-cog"></i>
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- VISTA TIENDA -->
        <section id="shop-view">
            <div class="flex gap-4 mb-8 overflow-x-auto pb-2 no-scrollbar" id="category-filters">
                <button onclick="filterByCategory('all')" class="px-5 py-2 rounded-full glass whitespace-nowrap active-filter border-blue-500 border">Todos</button>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6" id="products-grid">
                <!-- Productos dinámicos -->
            </div>
        </section>

        <!-- VISTA PANEL ADMIN -->
        <section id="admin-view" class="hidden animate-fade-in">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                <h2 class="text-3xl font-bold">Panel de Control</h2>
                <div class="flex gap-2 w-full md:w-auto">
                    <button onclick="showProductModal()" class="flex-1 md:flex-none bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded-lg font-bold flex items-center justify-center gap-2 transition-colors">
                        <i class="fa-solid fa-plus"></i> Nuevo Producto
                    </button>
                    <button onclick="logoutAdmin()" class="flex-1 md:flex-none bg-red-600/20 text-red-400 border border-red-600/30 px-4 py-2 rounded-lg font-bold hover:bg-red-600/30 transition-all">Salir</button>
                </div>
            </div>

            <!-- Tabs Admin -->
            <div class="flex border-b border-slate-700 mb-6 overflow-x-auto no-scrollbar">
                <button onclick="switchTab('products')" class="px-6 py-3 border-b-2 border-blue-500 font-bold tab-btn transition-all whitespace-nowrap" id="tab-products">Productos</button>
                <button onclick="switchTab('orders')" class="px-6 py-3 border-b-2 border-transparent font-bold tab-btn transition-all whitespace-nowrap" id="tab-orders">Pedidos</button>
                <button onclick="switchTab('settings')" class="px-6 py-3 border-b-2 border-transparent font-bold tab-btn transition-all whitespace-nowrap" id="tab-settings">Zonas y Bancos</button>
            </div>

            <div id="admin-content" class="glass rounded-2xl p-6">
                <!-- Contenido dinámico del panel -->
            </div>
        </section>
    </main>

    <!-- Modal Nuevo/Editar Producto -->
    <div id="product-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/80 p-4 backdrop-blur-sm">
        <div class="glass p-8 rounded-2xl w-full max-w-lg shadow-2xl">
            <h3 class="text-2xl font-bold mb-6 text-blue-400" id="modal-title">Nuevo Producto</h3>
            <form id="product-form" class="space-y-4">
                <input type="hidden" id="p-id">
                <div>
                    <label class="block text-sm text-slate-400 mb-1">Nombre del Producto</label>
                    <input type="text" id="p-name" class="w-full" placeholder="Ej: Pizza de Muzzarella" required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Precio ($)</label>
                        <input type="number" id="p-price" class="w-full" placeholder="0.00" required>
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Categoría</label>
                        <select id="p-category" class="w-full" required>
                            <option value="">Cargando...</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-1">Imagen (Subir archivo)</label>
                    <input type="file" id="p-file" class="w-full text-sm file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-500" accept="image/*">
                    <p class="text-[10px] text-slate-500 mt-2">O pega una URL directa abajo si prefieres</p>
                    <input type="text" id="p-image-url" class="w-full mt-1" placeholder="https://ejemplo.com/imagen.jpg">
                </div>
                <div class="flex gap-3 pt-6">
                    <button type="submit" id="btn-save-product" class="flex-1 bg-emerald-600 py-3 rounded-xl font-bold hover:bg-emerald-500 transition-all shadow-lg shadow-emerald-900/20">Guardar</button>
                    <button type="button" onclick="closeProductModal()" class="flex-1 bg-slate-700 py-3 rounded-xl font-bold hover:bg-slate-600 transition-all">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Cambiamos el nombre de la variable para evitar conflicto con la librería global de Supabase
        let supabaseClient = null;
        let isAdmin = false;
        let cart = [];
        let categories = [];
        let currentFilter = 'all';

        // --- Inicialización ---
        window.onload = () => {
            const url = localStorage.getItem('sb-url');
            const key = localStorage.getItem('sb-key');
            if (url && key) {
                initSupabase(url, key);
            } else {
                showSetup();
            }
        };

        function showSetup() { document.getElementById('setup-screen').classList.remove('hidden'); }
        function hideSetup() { document.getElementById('setup-screen').classList.add('hidden'); }

        function saveConnection() {
            const url = document.getElementById('supabase-url').value.trim();
            const key = document.getElementById('supabase-key').value.trim();
            if (url && key) {
                localStorage.setItem('sb-url', url);
                localStorage.setItem('sb-key', key);
                initSupabase(url, key);
                hideSetup();
            } else {
                alert("Por favor completa ambos campos");
            }
        }

        async function initSupabase(url, key) {
            try {
                // 'supabase' es el objeto global de la librería. Nosotros usamos supabaseClient para nuestras llamadas.
                if (typeof supabase === 'undefined') {
                    throw new Error("Librería de Supabase no cargada correctamente.");
                }
                supabaseClient = supabase.createClient(url, key);
                await loadAppData();
                renderShop();
            } catch (e) {
                console.error("Error init:", e);
                alert("Error crítico al inicializar conexión.");
            }
        }

        async function loadAppData() {
            try {
                const { data: cats, error } = await supabaseClient.from('categories').select('*');
                if (error) throw error;
                categories = cats || [];
                updateCategoryUI();
                updateCategorySelects();
            } catch (e) {
                console.error("Error loading cats:", e);
            }
        }

        function updateCategoryUI() {
            const filterContainer = document.getElementById('category-filters');
            const allBtn = `<button onclick="filterByCategory('all')" class="px-5 py-2 rounded-full glass whitespace-nowrap border ${currentFilter === 'all' ? 'border-blue-500' : 'border-transparent'}">Todos</button>`;
            const catBtns = categories.map(c => `
                <button onclick="filterByCategory('${c.id}')" class="px-5 py-2 rounded-full glass whitespace-nowrap border ${currentFilter === c.id ? 'border-blue-500' : 'border-transparent'}">
                    ${c.name}
                </button>
            `).join('');
            filterContainer.innerHTML = allBtn + catBtns;
        }

        function filterByCategory(id) {
            currentFilter = id;
            updateCategoryUI();
            renderShop();
        }

        // --- Gestión de Admin ---
        function toggleLogin(show) {
            if (isAdmin) {
                showAdminView();
                return;
            }
            document.getElementById('admin-login').classList.toggle('hidden', !show);
        }

        async function checkAdminPassword() {
            const pass = document.getElementById('admin-pass-input').value;
            try {
                const { data, error } = await supabaseClient.from('config').select('value').eq('key', 'admin_password').single();
                
                if (data && data.value === pass) {
                    isAdmin = true;
                    document.getElementById('admin-pass-input').value = "";
                    document.getElementById('admin-login').classList.add('hidden');
                    showAdminView();
                } else {
                    alert("Contraseña incorrecta");
                }
            } catch (e) {
                alert("Error al verificar contraseña. Asegúrate de haber corrido el SQL.");
            }
        }

        function showAdminView() {
            document.getElementById('shop-view').classList.add('hidden');
            document.getElementById('admin-view').classList.remove('hidden');
            switchTab('products');
        }

        function logoutAdmin() {
            isAdmin = false;
            document.getElementById('admin-view').classList.add('hidden');
            document.getElementById('shop-view').classList.remove('hidden');
        }

        // --- Productos ---
        async function renderShop() {
            try {
                let query = supabaseClient.from('products').select('*').eq('active', true);
                if (currentFilter !== 'all') {
                    query = query.eq('category_id', currentFilter);
                }
                
                const { data: products, error } = await query;
                if (error) throw error;

                const grid = document.getElementById('products-grid');
                if (!products || products.length === 0) {
                    grid.innerHTML = `<div class="col-span-full py-20 text-center text-slate-500">No hay productos en esta categoría</div>`;
                    return;
                }

                grid.innerHTML = products.map(p => `
                    <div class="glass rounded-2xl overflow-hidden group hover:shadow-2xl hover:shadow-blue-900/20 transition-all duration-300">
                        <div class="h-48 overflow-hidden bg-slate-800 relative">
                            <img src="${p.image_url || 'https://via.placeholder.com/300?text=Sin+Imagen'}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" onerror="this.src='https://via.placeholder.com/300?text=Error+Carga'">
                            <div class="absolute inset-0 bg-gradient-to-t from-slate-950/60 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        </div>
                        <div class="p-5">
                            <h3 class="font-bold text-lg mb-1">${p.name}</h3>
                            <p class="text-xs text-slate-400 mb-4">${categories.find(c => c.id === p.category_id)?.name || 'Producto'}</p>
                            <div class="flex justify-between items-center mt-auto">
                                <span class="text-2xl font-bold text-blue-400">$${p.price}</span>
                                <button onclick="addToCart('${p.id}')" class="bg-blue-600 p-3 rounded-xl hover:bg-blue-500 transition-colors shadow-lg shadow-blue-900/40">
                                    <i class="fa-solid fa-plus text-sm"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error("Error render shop:", e);
            }
        }

        async function handleUpload(file) {
            if (!file) return null;
            try {
                const extension = file.name.split('.').pop();
                const fileName = `${Date.now()}.${extension}`;
                const { data, error } = await supabaseClient.storage.from('images').upload(fileName, file);
                
                if (error) throw error;
                
                const { data: { publicUrl } } = supabaseClient.storage.from('images').getPublicUrl(fileName);
                return publicUrl;
            } catch (e) {
                console.error("Error upload:", e);
                alert("Error al subir imagen. ¿Creaste el bucket 'images' como público?");
                return null;
            }
        }

        document.getElementById('product-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-save-product');
            const originalText = btn.innerText;
            btn.innerText = "Guardando...";
            btn.disabled = true;

            try {
                const file = document.getElementById('p-file').files[0];
                let imageUrl = document.getElementById('p-image-url').value.trim();

                if (file) {
                    const uploadedUrl = await handleUpload(file);
                    if (uploadedUrl) imageUrl = uploadedUrl;
                }

                const pData = {
                    name: document.getElementById('p-name').value,
                    price: parseFloat(document.getElementById('p-price').value),
                    category_id: document.getElementById('p-category').value,
                    image_url: imageUrl || 'https://via.placeholder.com/300?text=Cocina+Gourmet'
                };

                const { error } = await supabaseClient.from('products').insert([pData]);
                
                if (error) throw error;

                closeProductModal();
                if (isAdmin) switchTab('products');
                renderShop();
            } catch (error) {
                console.error("Error saving product:", error);
                alert("No se pudo guardar el producto: " + error.message);
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        };

        function updateCategorySelects() {
            const select = document.getElementById('p-category');
            if (select) {
                if (categories.length === 0) {
                    select.innerHTML = `<option value="">Sin categorías</option>`;
                } else {
                    select.innerHTML = categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
                }
            }
        }

        function showProductModal() { 
            document.getElementById('product-modal').classList.remove('hidden'); 
            updateCategorySelects();
        }
        function closeProductModal() { 
            document.getElementById('product-modal').classList.add('hidden'); 
            document.getElementById('product-form').reset(); 
        }

        // --- Tabs Panel Admin ---
        async function switchTab(tab) {
            const content = document.getElementById('admin-content');
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('border-blue-500', 'text-blue-400');
                b.classList.add('border-transparent');
            });
            const activeBtn = document.getElementById(`tab-${tab}`);
            activeBtn.classList.add('border-blue-500', 'text-blue-400');
            activeBtn.classList.remove('border-transparent');

            content.innerHTML = `<div class="flex justify-center py-10"><i class="fa-solid fa-circle-notch fa-spin text-3xl text-blue-500"></i></div>`;

            try {
                if (tab === 'products') {
                    const { data: prods, error } = await supabaseClient.from('products').select(`
                        id, name, price, image_url, category_id,
                        categories ( name )
                    `);
                    if (error) throw error;

                    content.innerHTML = `
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead class="text-slate-400 border-b border-slate-800">
                                    <tr>
                                        <th class="py-4 px-4 font-semibold">Producto</th>
                                        <th class="py-4 px-4 font-semibold">Categoría</th>
                                        <th class="py-4 px-4 font-semibold text-right">Precio</th>
                                        <th class="py-4 px-4 text-center">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${prods.map(p => `
                                        <tr class="border-b border-slate-800/50 hover:bg-slate-800/30 transition-colors">
                                            <td class="py-4 px-4 flex items-center gap-4">
                                                <img src="${p.image_url}" class="w-12 h-12 rounded-lg object-cover shadow-sm">
                                                <span class="font-medium">${p.name}</span>
                                            </td>
                                            <td class="py-4 px-4 text-slate-400">${p.categories?.name || 'S/C'}</td>
                                            <td class="py-4 px-4 font-bold text-blue-400 text-right">$${p.price}</td>
                                            <td class="py-4 px-4 text-center">
                                                <button class="text-red-400 hover:text-red-300 p-2 transition-colors" onclick="deleteProduct('${p.id}')">
                                                    <i class="fa-solid fa-trash-can"></i>
                                                </button>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    `;
                } else if (tab === 'settings') {
                    const { data: zones } = await supabaseClient.from('zones').select('*');
                    content.innerHTML = `
                        <div class="grid md:grid-cols-2 gap-10">
                            <div>
                                <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
                                    <i class="fa-solid fa-truck-fast text-blue-400"></i> Gestión de Zonas
                                </h3>
                                <div class="bg-slate-800/50 p-6 rounded-2xl border border-slate-700/50 space-y-4">
                                    <input type="text" id="z-name" class="w-full" placeholder="Nombre (Ej: Maipú Centro)">
                                    <input type="text" id="z-wa" class="w-full" placeholder="WhatsApp (549...)">
                                    <button onclick="saveZone()" class="w-full bg-blue-600 py-3 rounded-xl font-bold hover:bg-blue-500 transition-all">Agregar Zona</button>
                                </div>
                                <div class="mt-6 space-y-3">
                                    ${zones.map(z => `
                                        <div class="flex justify-between items-center bg-slate-800/80 p-4 rounded-xl border border-slate-700">
                                            <div>
                                                <p class="font-bold">${z.name}</p>
                                                <p class="text-xs text-slate-400">${z.whatsapp}</p>
                                            </div>
                                            <button onclick="deleteZone('${z.id}')" class="text-red-400 hover:text-red-300 p-2">
                                                <i class="fa-solid fa-xmark text-lg"></i>
                                            </button>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    content.innerHTML = `<div class="py-20 text-center text-slate-500 italic">Módulo de pedidos en desarrollo...</div>`;
                }
            } catch (e) {
                content.innerHTML = `<div class="py-10 text-center text-red-400">Error al cargar datos: ${e.message}</div>`;
            }
        }

        async function saveZone() {
            const name = document.getElementById('z-name').value.trim();
            const wa = document.getElementById('z-wa').value.trim();
            if (!name || !wa) return alert("Completa los datos de la zona");
            
            try {
                await supabaseClient.from('zones').insert([{ name, whatsapp: wa }]);
                switchTab('settings');
            } catch (e) {
                alert("Error al guardar zona.");
            }
        }

        async function deleteProduct(id) {
            if (confirm("¿Estás seguro de eliminar este producto definitivamente?")) {
                try {
                    await supabaseClient.from('products').delete().eq('id', id);
                    switchTab('products');
                    renderShop();
                } catch (e) {
                    alert("No se pudo eliminar.");
                }
            }
        }

        async function deleteZone(id) {
            if (confirm("¿Eliminar esta zona de envío?")) {
                try {
                    await supabaseClient.from('zones').delete().eq('id', id);
                    switchTab('settings');
                } catch (e) {
                    alert("No se pudo eliminar la zona.");
                }
            }
        }

        // --- Carrito (Básico) ---
        function addToCart(id) {
            alert("¡Producto añadido! (Módulo de checkout próximamente)");
        }

        function showCart() {
            alert("El carrito se encuentra en mantenimiento.");
        }
    </script>
</body>
</html>
