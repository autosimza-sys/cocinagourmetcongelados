<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cocina Gourmet - Pedidos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-green: #10b981;
            --brand-dark: #064e3b;
        }
        .bg-brand-green { background-color: var(--brand-green); }
        .text-brand-green { color: var(--brand-green); }
        .bg-brand-dark { background-color: var(--brand-dark); }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--brand-green); border-radius: 10px; }

        .product-card-img {
            height: 90px;
            width: 90px;
            object-fit: cover;
            border-radius: 1rem;
        }

        #loading-overlay {
            position: fixed;
            inset: 0;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .phone-mockup {
            max-width: 380px;
            height: 750px;
            margin: 0 auto;
            border: 10px solid #1c1917;
            border-radius: 3rem;
            overflow: hidden;
            background: white;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-stone-100 min-h-screen">

    <!-- Pantalla de Carga -->
    <div id="loading-overlay">
        <div class="animate-spin rounded-full h-12 w-12 border-4 border-emerald-500 border-t-transparent mb-4"></div>
        <p id="loading-text" class="text-[10px] font-black uppercase tracking-widest text-stone-400">Conectando con el servidor...</p>
    </div>

    <!-- Navegación Superior -->
    <header class="bg-brand-dark text-white p-4 sticky top-0 z-[100] shadow-md">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fas fa-leaf text-emerald-400"></i>
                <h1 id="top-title" class="font-black italic uppercase tracking-tighter">COCINA GOURMET</h1>
            </div>
            <div class="flex gap-2">
                <button onclick="switchTab('preview')" class="text-[10px] font-black px-3 py-1.5 rounded-lg bg-emerald-500 uppercase">Tienda</button>
                <button onclick="checkAdmin()" class="text-[10px] font-black px-3 py-1.5 rounded-lg bg-stone-700 uppercase">Admin</button>
            </div>
        </div>
    </header>

    <main class="p-4 max-w-4xl mx-auto">
        <!-- VISTA CLIENTE -->
        <div id="tab-preview" class="block">
            <div class="phone-mockup flex flex-col">
                <div class="bg-brand-dark pt-8 pb-6 px-6 text-white text-center">
                    <div class="w-20 h-5 bg-black/20 rounded-full mx-auto mb-4"></div>
                    <h2 class="text-xl font-black italic">MENU SEMANAL</h2>
                    <p class="text-[10px] text-emerald-300 font-bold opacity-80">Rico, casero y listo para calentar</p>
                </div>

                <div class="flex gap-2 p-3 overflow-x-auto no-scrollbar bg-white border-b sticky top-0 z-10" id="cat-list">
                    <!-- Categorías dinámicas -->
                </div>

                <div class="flex-1 overflow-y-auto p-4 space-y-3 bg-stone-50" id="product-list-client">
                    <!-- Productos dinámicos -->
                </div>

                <div class="p-6 bg-white border-t">
                    <div class="flex justify-between items-end mb-4">
                        <div>
                            <p class="text-[10px] font-black text-stone-400 uppercase">Total Pedido</p>
                            <p id="total-price" class="text-2xl font-black text-stone-900">$0</p>
                        </div>
                        <p id="item-count" class="text-[10px] font-bold text-emerald-600 bg-emerald-50 px-2 py-1 rounded">0 items</p>
                    </div>
                    <button onclick="enviarWhatsApp()" class="w-full bg-emerald-500 text-white py-4 rounded-2xl font-black shadow-lg shadow-emerald-200 active:scale-95 transition-transform flex items-center justify-center gap-2">
                        <i class="fab fa-whatsapp text-lg"></i>
                        ENVIAR PEDIDO
                    </button>
                </div>
            </div>
        </div>

        <!-- VISTA ADMIN -->
        <div id="tab-admin" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-sm border">
                <h3 class="font-black uppercase italic mb-4">Configuración del Negocio</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="biz-name" onchange="saveBiz()" placeholder="Nombre del Negocio" class="p-3 bg-stone-100 rounded-xl outline-none text-sm font-bold">
                    <input type="text" id="biz-phone" onchange="saveBiz()" placeholder="WhatsApp (Ej: 54911...)" class="p-3 bg-stone-100 rounded-xl outline-none text-sm font-bold">
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm border">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-black uppercase italic">Inventario de Productos</h3>
                    <button onclick="openAddModal()" class="bg-emerald-500 text-white px-4 py-2 rounded-xl text-xs font-black">+ AGREGAR</button>
                </div>
                <div id="admin-list" class="space-y-2">
                    <!-- Lista de admin dinámica -->
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Producto -->
    <div id="modal-product" class="fixed inset-0 bg-black/60 z-[200] flex items-center justify-center hidden p-4">
        <div class="bg-white p-6 rounded-[2.5rem] w-full max-w-sm">
            <h3 class="font-black uppercase italic mb-4" id="modal-title">Nuevo Producto</h3>
            <div class="space-y-3">
                <input type="text" id="p-name" placeholder="Nombre del producto" class="w-full p-3 bg-stone-100 rounded-xl outline-none text-sm font-bold">
                <input type="text" id="p-cat" placeholder="Categoría" class="w-full p-3 bg-stone-100 rounded-xl outline-none text-sm font-bold">
                <input type="number" id="p-price" placeholder="Precio" class="w-full p-3 bg-stone-100 rounded-xl outline-none text-sm font-bold">
                <input type="text" id="p-img" placeholder="URL de imagen (opcional)" class="w-full p-3 bg-stone-100 rounded-xl outline-none text-sm">
            </div>
            <div class="flex gap-2 mt-6">
                <button onclick="closeModal()" class="flex-1 py-3 text-stone-400 font-bold uppercase text-xs">Cancelar</button>
                <button onclick="saveProduct()" class="flex-1 py-3 bg-emerald-500 text-white rounded-xl font-black uppercase text-xs shadow-md">Guardar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, deleteDoc, updateDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'cocina-gourmet-pro';

        let products = [];
        let cart = {};
        let activeCat = 'Todos';
        let editingId = null;
        let bizData = { name: 'COCINA GOURMET', phone: '' };

        // Datos iniciales si la base está vacía
        const defaultProds = [
            { name: "Empanadas Carne (Pack x6)", category: "Empanadas", price: 6500, image: "https://images.unsplash.com/photo-1550547660-d9450f859349?w=300" },
            { name: "Tartín Pollo", category: "Tartines", price: 6500, image: "https://images.unsplash.com/photo-1544025162-d76694265947?w=300" },
            { name: "Vianda: Milanesas con Puré", category: "Viandas", price: 9500, image: "https://images.unsplash.com/photo-1632778149975-4204d33a6e68?w=300" }
        ];

        // Función de inicio robusta
        const startApp = async () => {
            try {
                document.getElementById('loading-text').innerText = "Autenticando...";
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth error:", err);
                document.getElementById('loading-text').innerText = "Error de conexión. Reintentando...";
                setTimeout(startApp, 2000);
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                setupListeners(user.uid);
            }
        });

        async function setupListeners(uid) {
            document.getElementById('loading-text').innerText = "Cargando menú...";
            
            // 1. Configuración del Negocio (Ruta de 6 segmentos)
            const bizRef = doc(db, 'artifacts', appId, 'public', 'data', 'config', 'main');
            onSnapshot(bizRef, (snap) => {
                if (snap.exists()) {
                    bizData = snap.data();
                    document.getElementById('biz-name').value = bizData.name || '';
                    document.getElementById('biz-phone').value = bizData.phone || '';
                    document.getElementById('top-title').innerText = bizData.name || 'COCINA GOURMET';
                } else {
                    setDoc(bizRef, bizData);
                }
            }, (error) => console.error("Error en config:", error));

            // 2. Escuchar Productos
            const prodRef = collection(db, 'artifacts', appId, 'public', 'data', 'products');
            onSnapshot(prodRef, async (snap) => {
                if (snap.empty) {
                    // Si no hay productos, insertamos los básicos
                    for (const p of defaultProds) await addDoc(prodRef, p);
                } else {
                    products = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    renderAll();
                    hideLoading();
                }
            }, (error) => {
                console.error("Error en productos:", error);
                document.getElementById('loading-text').innerText = "Error cargando datos.";
            });
        }

        function hideLoading() {
            const loader = document.getElementById('loading-overlay');
            loader.style.opacity = '0';
            setTimeout(() => loader.style.display = 'none', 500);
        }

        function renderAll() {
            renderCategories();
            renderClientProducts();
            renderAdminProducts();
            updateCartSummary();
        }

        function renderCategories() {
            const container = document.getElementById('cat-list');
            const cats = ['Todos', ...new Set(products.map(p => p.category))];
            container.innerHTML = cats.map(c => `
                <button onclick="setCategory('${c}')" class="px-4 py-2 rounded-xl text-[10px] font-black uppercase whitespace-nowrap transition ${activeCat === c ? 'bg-emerald-500 text-white' : 'bg-stone-100 text-stone-400'}">
                    ${c}
                </button>
            `).join('');
        }

        window.setCategory = (c) => { activeCat = c; renderAll(); };

        function renderClientProducts() {
            const container = document.getElementById('product-list-client');
            const filtered = products.filter(p => activeCat === 'Todos' || p.category === activeCat);
            
            if (filtered.length === 0) {
                container.innerHTML = `<p class="text-center text-stone-400 text-xs py-10 font-bold">No hay productos en esta categoría.</p>`;
                return;
            }

            container.innerHTML = filtered.map(p => `
                <div class="bg-white p-2 rounded-2xl border border-stone-100 shadow-sm flex gap-3">
                    <img src="${p.image || 'https://via.placeholder.com/150'}" class="product-card-img bg-stone-100">
                    <div class="flex-1 flex flex-col justify-between py-1">
                        <div>
                            <h4 class="text-[11px] font-black uppercase italic leading-tight">${p.name}</h4>
                            <p class="text-xs font-bold text-emerald-600 mt-1">$${p.price.toLocaleString()}</p>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-[8px] font-bold text-stone-300 uppercase">${p.category}</span>
                            <div class="flex items-center gap-2 bg-stone-50 rounded-lg p-1">
                                <button onclick="updateQty('${p.id}', -1)" class="w-6 h-6 bg-white rounded border font-bold text-stone-400">-</button>
                                <span class="text-xs font-black w-4 text-center">${cart[p.id] || 0}</span>
                                <button onclick="updateQty('${p.id}', 1)" class="w-6 h-6 bg-emerald-500 text-white rounded shadow-sm font-bold">+</button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderAdminProducts() {
            const container = document.getElementById('admin-list');
            container.innerHTML = products.map(p => `
                <div class="flex items-center gap-3 p-3 bg-stone-50 rounded-xl border">
                    <img src="${p.image || ''}" class="w-10 h-10 rounded-lg object-cover">
                    <div class="flex-1">
                        <p class="text-[10px] font-black uppercase leading-none">${p.name}</p>
                        <p class="text-[9px] text-stone-400 font-bold">$${p.price} • ${p.category}</p>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="openEdit('${p.id}')" class="p-2 text-stone-400 hover:text-emerald-500"><i class="fas fa-edit text-xs"></i></button>
                        <button onclick="delProd('${p.id}')" class="p-2 text-stone-400 hover:text-red-500"><i class="fas fa-trash text-xs"></i></button>
                    </div>
                </div>
            `).join('');
        }

        window.updateQty = (id, delta) => {
            cart[id] = Math.max(0, (cart[id] || 0) + delta);
            renderAll();
        };

        function updateCartSummary() {
            let total = 0, count = 0;
            products.forEach(p => {
                if (cart[p.id]) {
                    total += (p.price * cart[p.id]);
                    count += cart[p.id];
                }
            });
            document.getElementById('total-price').innerText = `$${total.toLocaleString()}`;
            document.getElementById('item-count').innerText = `${count} items`;
        }

        window.enviarWhatsApp = () => {
            const phone = bizData.phone;
            if (!phone) {
                alert("Primero debes configurar un número de WhatsApp en la sección Admin.");
                return;
            }
            
            let items = "";
            let total = 0;
            products.forEach(p => {
                if (cart[p.id] > 0) {
                    items += `• ${p.name} (x${cart[p.id]})\n`;
                    total += (p.price * cart[p.id]);
                }
            });

            if (total === 0) {
                alert("Agrega productos al carrito primero.");
                return;
            }

            const text = encodeURIComponent(`🍽️ *NUEVO PEDIDO*\n\n${items}\n💰 *TOTAL: $${total.toLocaleString()}*\n\n¿Me confirman el pedido?`);
            window.open(`https://wa.me/${phone.replace(/\D/g,'')}?text=${text}`);
        };

        window.switchTab = (t) => {
            document.getElementById('tab-preview').classList.toggle('hidden', t !== 'preview');
            document.getElementById('tab-admin').classList.toggle('hidden', t !== 'admin');
        };

        window.checkAdmin = () => {
            const pass = prompt("Ingrese PIN (1234):");
            if (pass === "1234") switchTab('admin');
        };

        window.saveBiz = async () => {
            const data = {
                name: document.getElementById('biz-name').value,
                phone: document.getElementById('biz-phone').value
            };
            const bizRef = doc(db, 'artifacts', appId, 'public', 'data', 'config', 'main');
            await setDoc(bizRef, data);
        };

        window.openAddModal = () => {
            editingId = null;
            document.getElementById('modal-title').innerText = "Nuevo Producto";
            document.getElementById('p-name').value = "";
            document.getElementById('p-cat').value = "";
            document.getElementById('p-price').value = "";
            document.getElementById('p-img').value = "";
            document.getElementById('modal-product').classList.remove('hidden');
        };

        window.openEdit = (id) => {
            const p = products.find(x => x.id === id);
            editingId = id;
            document.getElementById('modal-title').innerText = "Editar Producto";
            document.getElementById('p-name').value = p.name;
            document.getElementById('p-cat').value = p.category;
            document.getElementById('p-price').value = p.price;
            document.getElementById('p-img').value = p.image || "";
            document.getElementById('modal-product').classList.remove('hidden');
        };

        window.closeModal = () => document.getElementById('modal-product').classList.add('hidden');

        window.saveProduct = async () => {
            const data = {
                name: document.getElementById('p-name').value,
                category: document.getElementById('p-cat').value || "General",
                price: parseFloat(document.getElementById('p-price').value) || 0,
                image: document.getElementById('p-img').value
            };
            
            if (!data.name) return alert("El nombre es obligatorio");

            try {
                if (editingId) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', editingId), data);
                } else {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'products'), data);
                }
                closeModal();
            } catch (err) {
                console.error("Save error:", err);
            }
        };

        window.delProd = async (id) => {
            if (confirm("¿Eliminar producto?")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', id));
            }
        };

        // Ejecutar inicio
        startApp();

    </script>
</body>
</html>
