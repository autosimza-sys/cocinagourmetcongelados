<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cocina Gourmet</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<style>
body { font-family: Arial; background:#0f172a; color:white; padding:20px;}
button { padding:10px; margin:5px; background:#22c55e; border:none; color:white; cursor:pointer;}
input { padding:10px; margin:5px;}
</style>
</head>

<body>

<h1>Cocina Gourmet</h1>

<button onclick="config()">Configurar conexión</button>

<h2>Agregar producto</h2>
<input id="nombre" placeholder="Nombre">
<input id="precio" placeholder="Precio">
<button onclick="guardar()">Guardar</button>

<h2>Productos</h2>
<div id="lista"></div>

<script>

let supabase = null;

function config(){
    const url = prompt("Pegá tu Project URL");
    const key = prompt("Pegá tu anon key");
    supabase = window.supabase.createClient(url, key);
    alert("Conectado!");
    cargar();
}

async function guardar(){
    const nombre = document.getElementById("nombre").value;
    const precio = document.getElementById("precio").value;

    await supabase.from("products").insert([{name:nombre, price:precio}]);

    cargar();
}

async function cargar(){
    const {data} = await supabase.from("products").select("*");
    let html = "";
    data.forEach(p=>{
        html += `<div>${p.name} - $${p.price}</div>`;
    });
    document.getElementById("lista").innerHTML = html;
}

</script>

</body>
</html>
