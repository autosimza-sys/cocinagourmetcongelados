<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Pedidos - Cocina Gourmet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-green-dark: #064e3b;
            --brand-green-primary: #10b981;
            --brand-green-light: #d1fae5;
        }
        .bg-brand-dark { background-color: var(--brand-green-dark); }
        .bg-brand-primary { background-color: var(--brand-green-primary); }
        .text-brand-primary { color: var(--brand-green-primary); }
        .border-brand-primary { border-color: var(--brand-green-primary); }
        
        .bg-whatsapp { background-color: #25D366; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }

        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .logo-preview-container {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <!-- Header -->
    <header class="bg-brand-dark text-white p-6 shadow-xl border-b-4 border-brand-primary">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-white p-2 rounded-lg">
                    <i class="fas fa-hat-chef text-brand-primary text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight">Cocina <span class="text-brand-primary">Gourmet</span></h1>
                    <p class="text-xs text-emerald-200 opacity-80 uppercase tracking-widest italic">Congelados Premium</p>
                </div>
            </div>
            <nav class="flex bg-emerald-900/50 p-1 rounded-xl">
                <button onclick="tryAccessConfig()" id="btn-config" class="px-6 py-2 rounded-lg text-emerald-100 hover:text-white transition font-medium">
                    <i class="fas fa-cog mr-2"></i>Panel Control
                </button>
                <button onclick="switchTab('preview')" id="btn-preview" class="px-6 py-2 rounded-lg bg-brand-primary text-white font-medium shadow-md transition">
                    <i class="fas fa-mobile-alt mr-2"></i>Vista Cliente
                </button>
            </nav>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-8">
        
        <!-- Tab: CONFIGURACIÓN (Protegida) -->
        <section id="tab-config" class="space-y-8 animate-fade-in hidden">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Ajustes de Negocio -->
                <div class="md:col-span-1 bg-white p-6 rounded-3xl shadow-sm border border-emerald-100">
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-2 text-emerald-900">
                        <i class="fas fa-store text-brand-primary"></i> Datos del Negocio
                    </h2>
                    <div class="space-y-5">
                        <div>
                            <label class="block text-sm font-bold text-gray-600 mb-1">WhatsApp Godoy Cruz</label>
                            <input type="text" id="biz-phone-gc" placeholder="549261..." class="w-full p-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-primary outline-none transition">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-600 mb-1">WhatsApp Maipú</label>
                            <input type="text" id="biz-phone-mp" placeholder="549261..." class="w-full p-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-primary outline-none transition">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-600 mb-1">Nombre Comercial</label>
                            <input type="text" id="biz-name" value="Cocina Gourmet" class="w-full p-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-primary outline-none transition">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-600 mb-1">Logo URL</label>
                            <input type="text" id="biz-logo" value="https://cdn-icons-png.flaticon.com/512/3448/3448099.png" class="w-full p-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-primary outline-none transition">
                        </div>
                        <div class="pt-4 border-t border-gray-100">
                            <button onclick="logoutAdmin()" class="w-full text-xs text-red-400 hover:text-red-600 font-bold uppercase tracking-widest transition">
                                <i class="fas fa-sign-out-alt mr-1"></i> Cerrar Sesión Admin
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Gestor de Inventario -->
                <div class="md:col-span-2 bg-white p-6 rounded-3xl shadow-sm border border-emerald-100">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold flex items-center gap-2 text-emerald-900">
                            <i class="fas fa-clipboard-list text-brand-primary"></i> Lista de Precios
                        </h2>
                        <button onclick="addProduct()" class="bg-brand-primary text-white px-5 py-2.5 rounded-xl text-sm font-bold hover:bg-emerald-600 shadow-lg transition-all">
                            <i class="fas fa-plus mr-2"></i>Añadir Producto
                        </button>
                    </div>
                    <div class="overflow-x-auto rounded-2xl border border-gray-50">
                        <table class="w-full text-left">
                            <thead class="bg-emerald-50 text-emerald-800 text-xs uppercase tracking-wider">
                                <tr>
                                    <th class="p-4">Producto</th>
                                    <th class="p-4 text-center">Categoría</th>
                                    <th class="p-4 text-right">Precio</th>
                                    <th class="p-4 text-center">Acción</th>
                                </tr>
                            </thead>
                            <tbody id="product-list" class="divide-y divide-gray-100">
                                <!-- JS Populated -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>

        <!-- Tab: VISTA CLIENTE -->
        <section id="tab-preview" class="animate-fade-in">
            <div class="flex flex-col items-center">
                
                <!-- Mockup de Celular -->
                <div class="w-full max-w-[360px] border-[12px] border-slate-900 rounded-[3.5rem] h-[780px] bg-white shadow-2xl relative overflow-hidden ring-4 ring-emerald-100">
                    <div class="bg-slate-900 h-6 w-32 absolute top-0 left-1/2 -translate-x-1/2 rounded-b-2xl z-30"></div>
                    
                    <div class="h-full flex flex-col">
                        <!-- Header App Cliente -->
                        <div class="relative pt-10 pb-6 px-5 bg-gradient-to-br from-brand-dark to-brand-primary text-white shadow-md flex flex-col items-center">
                            <div class="w-20 h-20 bg-white rounded-full p-1 shadow-xl mb-3 border-2 border-emerald-300 overflow-hidden flex items-center justify-center">
                                <img id="client-logo-img" src="" alt="Logo" class="logo-preview-container">
                            </div>
                            <h3 id="preview-biz-name" class="font-black text-center text-lg tracking-tight uppercase leading-tight">COCINA GOURMET</h3>
                        </div>

                        <!-- Menu App Cliente -->
                        <div class="flex-1 overflow-y-auto p-4 space-y-6 bg-emerald-50/30" id="client-menu">
                            <!-- JS Populated -->
                        </div>

                        <!-- Footer Carrito -->
                        <div class="p-5 bg-white border-t-2 border-emerald-100 rounded-t-3xl shadow-[0_-10px_20px_rgba(0,0,0,0.05)] space-y-4">
                            <!-- Selector de Zona y Pago -->
                            <div class="grid grid-cols-2 gap-2">
                                <div>
                                    <label class="text-[9px] font-black uppercase text-gray-400 ml-1">Zona</label>
                                    <select id="client-zone" class="w-full text-xs font-bold p-2 bg-slate-50 border border-slate-200 rounded-lg outline-none">
                                        <option value="gc">Godoy Cruz</option>
                                        <option value="mp">Maipú</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="text-[9px] font-black uppercase text-gray-400 ml-1">Pago</label>
                                    <select id="client-payment" class="w-full text-xs font-bold p-2 bg-slate-50 border border-slate-200 rounded-lg outline-none">
                                        <option value="Efectivo">Efectivo</option>
                                        <option value="Mercado Pago">Mercado Pago</option>
                                        <option value="Transferencia">Transferencia</option>
                                    </select>
                                </div>
                            </div>

                            <div class="flex justify-between items-end">
                                <div>
                                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-tighter leading-none">Total</p>
                                    <span class="text-2xl font-black text-emerald-900" id="cart-total">$0</span>
                                </div>
                                <button onclick="sendOrder()" class="flex-1 ml-4 bg-whatsapp text-white py-3 rounded-2xl font-black text-xs flex items-center justify-center gap-2 shadow-lg hover:scale-[1.02] active:scale-95 transition-all">
                                    <i class="fab fa-whatsapp"></i> PEDIR AHORA
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- Modal Form -->
    <div id="product-modal" class="fixed inset-0 bg-emerald-950/40 backdrop-blur-sm flex items-center justify-center hidden z-50">
        <div class="bg-white p-8 rounded-[2rem] w-full max-w-md mx-4 shadow-2xl">
            <h3 class="text-2xl font-black mb-6 text-emerald-900 italic text-center text-sm uppercase">Nuevo Producto</h3>
            <div class="space-y-4">
                <input type="text" id="modal-name" placeholder="Nombre" class="w-full p-3 bg-gray-50 rounded-xl outline-none border border-transparent focus:border-brand-primary">
                <input type="text" id="modal-cat" placeholder="Categoría" class="w-full p-3 bg-gray-50 rounded-xl outline-none border border-transparent focus:border-brand-primary">
                <input type="number" id="modal-price" placeholder="Precio" class="w-full p-3 bg-gray-50 rounded-xl outline-none border border-transparent focus:border-brand-primary">
            </div>
            <div class="flex justify-end gap-3 mt-8">
                <button onclick="closeModal()" class="px-6 py-3 text-gray-400 font-bold">Cancelar</button>
                <button onclick="saveProduct()" class="px-8 py-3 bg-brand-primary text-white rounded-2xl font-bold shadow-lg">Guardar</button>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="fixed inset-0 bg-brand-dark/95 backdrop-blur-md flex items-center justify-center hidden z-[100]">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-xs shadow-2xl text-center">
            <h3 class="text-xl font-black text-emerald-900 mb-6 uppercase">Admin</h3>
            <input type="password" id="admin-pass" placeholder="PIN" class="w-full p-4 bg-gray-100 rounded-2xl text-center text-2xl tracking-[0.5em] mb-4 outline-none">
            <button onclick="checkAdminPass()" class="w-full bg-brand-primary text-white py-4 rounded-2xl font-bold shadow-lg">Entrar</button>
            <button onclick="closeLogin()" class="mt-4 text-xs text-gray-400 font-bold uppercase">Volver</button>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "1234";
        let isAdminAuthenticated = false;

        let products = [
            { id: 1, name: "Carne", category: "🥟 EMPANADAS (pack x6)", price: 6500 },
            { id: 2, name: "Jamón y queso", category: "🥟 EMPANADAS (pack x6)", price: 7000 },
            { id: 3, name: "Pollo", category: "🥟 EMPANADAS (pack x6)", price: 7000 },
            { id: 4, name: "Acelga y zanahoria", category: "🥟 EMPANADAS (pack x6)", price: 6000 },
            { id: 5, name: "Humita", category: "🥟 EMPANADAS (pack x6)", price: 6000 },
            { id: 6, name: "Cebolla y muzzarella", category: "🥟 EMPANADAS (pack x6)", price: 6000 },
            { id: 7, name: "Pollo", category: "🥧 TARTINES", price: 6500 },
            { id: 8, name: "Acelga y zanahoria", category: "🥧 TARTINES", price: 5500 },
            { id: 9, name: "Cebolla y muzzarella", category: "🥧 TARTINES", price: 5500 },
            { id: 10, name: "Humita", category: "🥧 TARTINES", price: 5500 },
            { id: 11, name: "Muzzarella Grande (35 cm)", category: "🍕 PIZZAS", price: 9000 }
        ];
        
        let cart = {};

        window.onload = () => {
            renderProducts();
            renderClientView();
        };

        function switchTab(tab) {
            document.getElementById('tab-config').classList.toggle('hidden', tab !== 'config');
            document.getElementById('tab-preview').classList.toggle('hidden', tab !== 'preview');
            if(tab === 'preview') renderClientView();
        }

        function tryAccessConfig() {
            if (isAdminAuthenticated) switchTab('config');
            else document.getElementById('login-modal').classList.remove('hidden');
        }

        function checkAdminPass() {
            if (document.getElementById('admin-pass').value === ADMIN_PASSWORD) {
                isAdminAuthenticated = true;
                document.getElementById('login-modal').classList.add('hidden');
                switchTab('config');
            } else alert("Error de PIN");
        }

        function closeLogin() { document.getElementById('login-modal').classList.add('hidden'); }
        function logoutAdmin() { isAdminAuthenticated = false; switchTab('preview'); }

        function renderProducts() {
            const list = document.getElementById('product-list');
            list.innerHTML = products.map(p => `
                <tr class="text-xs">
                    <td class="p-4 font-bold uppercase">${p.name}</td>
                    <td class="p-4 text-center text-gray-400">${p.category}</td>
                    <td class="p-4 text-right font-black">$${p.price.toLocaleString()}</td>
                    <td class="p-4 text-center"><button onclick="removeProduct(${p.id})" class="text-red-300">×</button></td>
                </tr>
            `).join('');
        }

        function removeProduct(id) { products = products.filter(p => p.id !== id); renderProducts(); }
        function addProduct() { document.getElementById('product-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('product-modal').classList.add('hidden'); }

        function saveProduct() {
            const name = document.getElementById('modal-name').value;
            const category = document.getElementById('modal-cat').value;
            const price = document.getElementById('modal-price').value;
            if(name && price) {
                products.push({ id: Date.now(), name, category: category || 'Gral', price: parseFloat(price) });
                renderProducts();
                closeModal();
            }
        }

        function renderClientView() {
            const clientMenu = document.getElementById('client-menu');
            const categories = [...new Set(products.map(p => p.category))];
            document.getElementById('client-logo-img').src = document.getElementById('biz-logo').value;
            document.getElementById('preview-biz-name').innerText = document.getElementById('biz-name').value;

            clientMenu.innerHTML = categories.map(cat => `
                <div>
                    <h5 class="text-[9px] font-black text-brand-primary uppercase mb-3 border-b border-emerald-100 pb-1">${cat}</h5>
                    <div class="space-y-2">
                        ${products.filter(p => p.category === cat).map(p => `
                            <div class="bg-white p-3 rounded-2xl border border-emerald-50 flex justify-between items-center shadow-sm">
                                <div class="flex-1">
                                    <h4 class="font-bold text-emerald-900 text-[10px] uppercase">${p.name}</h4>
                                    <p class="text-brand-primary font-black text-[10px]">$${p.price.toLocaleString()}</p>
                                </div>
                                <div class="flex items-center bg-emerald-50 rounded-xl p-1 gap-1">
                                    <button onclick="updateQty(${p.id}, -1)" class="w-6 h-6 rounded-lg bg-white shadow-sm flex items-center justify-center text-emerald-600 font-bold">-</button>
                                    <span id="qty-${p.id}" class="w-4 text-center font-black text-emerald-900 text-[10px]">${cart[p.id] || 0}</span>
                                    <button onclick="updateQty(${p.id}, 1)" class="w-6 h-6 rounded-lg bg-brand-primary text-white shadow-md flex items-center justify-center font-bold">+</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
            updateTotal();
        }

        function updateQty(id, delta) {
            cart[id] = Math.max(0, (cart[id] || 0) + delta);
            document.getElementById(`qty-${id}`).innerText = cart[id];
            updateTotal();
        }

        function updateTotal() {
            let total = 0;
            products.forEach(p => { if(cart[p.id]) total += (p.price * cart[p.id]); });
            document.getElementById('cart-total').innerText = `$${total.toLocaleString()}`;
        }

        function sendOrder() {
            const zone = document.getElementById('client-zone').value;
            const payment = document.getElementById('client-payment').value;
            const phone = zone === 'gc' ? document.getElementById('biz-phone-gc').value : document.getElementById('biz-phone-mp').value;

            if(!phone) return alert("Configura los WhatsApp en el panel.");

            let items = "";
            let total = 0;
            products.forEach(p => {
                if(cart[p.id] > 0) {
                    items += `• ${p.name} x${cart[p.id]}\n`;
                    total += p.price * cart[p.id];
                }
            });

            if(total === 0) return alert("Carrito vacío");

            const zoneName = zone === 'gc' ? 'Godoy Cruz' : 'Maipú';
            const msg = `🧑‍🍳 *PEDIDO - ${document.getElementById('biz-name').value}*\n\n📍 *Zona:* ${zoneName}\n💳 *Pago:* ${payment}\n\n${items}\n💰 *TOTAL: $${total.toLocaleString()}*`;
            window.open(`https://wa.me/${phone.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
